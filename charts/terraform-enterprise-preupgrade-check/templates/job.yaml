apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "preupgrade-check.fullname" . }}
  labels:
    {{- include "preupgrade-check.labels" . | nindent 4 }}
spec:
  backoffLimit: {{ .Values.job.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
  {{- if .Values.job.activeDeadlineSeconds }}
  activeDeadlineSeconds: {{ .Values.job.activeDeadlineSeconds }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "preupgrade-check.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "preupgrade-check.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.openshift.enabled }}
      securityContext:
        runAsNonRoot: true
      {{- end }}
      containers:
        - name: preupgrade-check
          image: {{ include "preupgrade-check.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/preupgrade-check"]
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "preupgrade-check.fullname" . }}-env
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.openshift.enabled }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          {{- end }}
          {{- if include "preupgrade-check.tlsEnabled" . }}
          volumeMounts:
            - name: tls-certs
              mountPath: {{ .Values.tls.mountPath }}
              readOnly: true
          {{- end }}
      {{- if include "preupgrade-check.tlsEnabled" . }}
      volumes:
        - name: tls-certs
          secret:
            secretName: {{ include "preupgrade-check.tlsSecretName" . }}
            {{- if .Values.tls.certSecret }}
            {{- /* Remap standard TLS Secret keys to the filenames TFE expects */ -}}
            items:
              - key: tls.crt
                path: cert.pem
              - key: tls.key
                path: key.pem
            {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
