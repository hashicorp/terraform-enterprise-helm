{{/*
TLS Secret — only created when inline cert and key are provided
and no existing certSecret is referenced.
*/}}
{{- if and .Values.tls.cert .Values.tls.key (not .Values.tls.certSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "preupgrade-check.fullname" . }}-tls
  labels:
    {{- include "preupgrade-check.labels" . | nindent 4 }}
type: Opaque
stringData:
  cert.pem: |
    {{- .Values.tls.cert | nindent 4 }}
  key.pem: |
    {{- .Values.tls.key | nindent 4 }}
  {{- if .Values.tls.caCert }}
  ca-bundle.pem: |
    {{- .Values.tls.caCert | nindent 4 }}
  {{- end }}
{{- end }}
