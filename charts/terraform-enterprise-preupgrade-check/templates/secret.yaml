{{/*
Validate: at least one config source must be provided.
*/}}
{{- if and (not .Values.envFile) (not .Values.env) }}
  {{- fail "You must provide TFE configuration via either --set-file envFile=<path> or env values in values.yaml." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "preupgrade-check.fullname" . }}-env
  labels:
    {{- include "preupgrade-check.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.envFile }}
  {{- /*
    Parse a KEY=VALUE env file into Secret stringData entries.
    Rules:
      - Skip blank lines and lines starting with #
      - Strip optional 'export ' prefix
      - Split on first '=' only (values may contain '=')
      - Strip optional surrounding quotes (single or double)
  */ -}}
  {{- range $line := splitList "\n" .Values.envFile }}
  {{- $trimmed := trim $line }}
  {{- if and (ne $trimmed "") (not (hasPrefix "#" $trimmed)) }}
  {{- $clean := trimPrefix "export " $trimmed }}
  {{- $parts := regexSplit "=" $clean 2 }}
  {{- if ge (len $parts) 2 }}
  {{- $key := index $parts 0 | trim }}
  {{- $val := index $parts 1 | trim }}
  {{ $key }}: {{ include "preupgrade-check.unquote" $val | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- else }}
  {{- range $key, $val := .Values.env }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
  {{- end }}
