{{- include "helpers.preupgrade-validate-config" . }}
{{- if and .Values.preupgradeCheck.enabled .Values.preupgradeCheck.extraSecrets }}
# Holds sensitive configuration overrides for the preupgrade-check Job.
# Values here take precedence over the main terraform-enterprise-env-secrets
# Secret because they are injected as explicit env: entries on the container,
# which always win over envFrom in Kubernetes.
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "helpers.preupgrade-overrides-secret-name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: terraform-enterprise-preupgrade-check
    preupgrade-check.hashicorp.com/name: {{ include "helpers.preupgrade-job-name" . }}
    {{- include "k8s.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $val := .Values.preupgradeCheck.extraSecrets }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}
